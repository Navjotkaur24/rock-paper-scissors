<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <p class="heading">Rock Paper Scissors</p>
    <span>
        <button class="rock">
            <img src="images/rock-emoji.png" alt="rock">
        </button>
        <button class="paper">
            <img src="images/paper-emoji.png" alt="paper">
        </button>
        <button class="scissors">
            <img src="images/scissors-emoji.png" alt="scissors">
        </button>
    </span>
    <div>
        <p class="para1"></p>
        <p class="para2"></p>
        <p class="para3"></p>
        <button class="reset">Reset Score</button>
        <button class="auto-play">Auto Play</button>
    </div>


<script src="script.js"></script>
</body>
</html>
